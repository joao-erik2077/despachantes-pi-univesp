<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem de Despachante</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Icons (Phosphor Icons for a clean, modern look) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ph ph-car-profile"></i>
                <span>Despachante</span>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('home.index') }}" class="nav-item {% if request.endpoint == 'home.index' %}active{% endif %}">
                    <i class="ph ph-squares-four" style="margin-right: 10px; font-size: 1.25rem;"></i>
                    Dashboard
                </a>
                <a href="{{ url_for('home.clientes') }}" class="nav-item {% if 'cliente' in request.endpoint %}active{% endif %}">
                    <i class="ph ph-users" style="margin-right: 10px; font-size: 1.25rem;"></i>
                    Clientes
                </a>
                <a href="{{ url_for('home.veiculos') }}" class="nav-item {% if 'veiculo' in request.endpoint %}active{% endif %}">
                    <i class="ph ph-car" style="margin-right: 10px; font-size: 1.25rem;"></i>
                    Veículos
                </a>
                <a href="{{ url_for('home.processos') }}" class="nav-item {% if 'processo' in request.endpoint %}active{% endif %}">
                    <i class="ph ph-folder-open" style="margin-right: 10px; font-size: 1.25rem;"></i>
                    Processos
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="breadcrumb">
                    <span style="color: var(--text-muted); font-weight: 500;">{% block breadcrumb %}Início{% endblock %}</span>
                </div>
                <div class="user-profile" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 500;">
                    <div style="width: 32px; height: 32px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="ph ph-user"></i>
                    </div>
                    <span>Operador</span>
                </div>
            </header>

            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script>
        // Simple tab logic
        document.addEventListener('DOMContentLoaded', () => {
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.target;
                    const group = btn.closest('.card').querySelectorAll('.tab-content');
                    const btns = btn.closest('.tabs').querySelectorAll('.tab-btn');
                    
                    btns.forEach(b => b.classList.remove('active'));
                    group.forEach(c => c.classList.remove('active'));
                    
                    btn.classList.add('active');
                    document.getElementById(target).classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
