{% extends 'base.html' %}

{% block breadcrumb %}Clientes / Cadastro{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header" style="background-color: #f8fafc; margin: -1.5rem -1.5rem 1.5rem -1.5rem; padding: 1rem 1.5rem; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; border-bottom: 2px solid var(--primary-color);">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <i class="ph ph-user" style="font-size: 2rem; color: var(--primary-color);"></i>
            <div>
                <h2 class="card-title" style="margin-bottom: 0; color: #1e293b;">{{ 'Editar Cliente' if cliente else 'Novo Cliente' }}</h2>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Cadastro de informações do proprietário</span>
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button type="submit" form="clienteForm" class="btn btn-secondary"><i class="ph ph-floppy-disk" style="margin-right: 0.5rem;"></i>Salvar</button>
            <a href="{{ url_for('home.clientes') }}" class="btn btn-danger"><i class="ph ph-x" style="margin-right: 0.5rem;"></i>Cancelar</a>
        </div>
    </div>

    <form id="clienteForm" action="{{ url_for('home.cliente_editar', id=cliente.id) if cliente else url_for('home.cliente_novo') }}" method="POST">
        <h3 style="font-size: 1rem; color: var(--text-main); margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Dados Pessoais</h3>
        <div class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control" name="nome" value="{{ cliente.nome if cliente else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">CPF/CNPJ</label>
                <input type="text" class="form-control" name="cpf__cnpj" value="{{ cliente.cpf__cnpj if cliente else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">RG</label>
                <input type="text" class="form-control" name="rg" value="{{ cliente.rg if cliente else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Data de Nascimento</label>
                <input type="date" class="form-control" name="data_nascimento" value="{{ cliente.data_nascimento.strftime('%Y-%m-%d') if cliente and cliente.data_nascimento else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Vencimento CNH</label>
                <input type="date" class="form-control" name="vencimento_cnh" value="{{ cliente.vencimento_cnh.strftime('%Y-%m-%d') if cliente and cliente.vencimento_cnh else '' }}" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">E-Mail</label>
                <input type="email" class="form-control" name="email" value="{{ cliente.email if cliente else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Telefone / WhatsApp</label>
                <input type="text" class="form-control" name="telefone" value="{{ cliente.telefone if cliente else '' }}" required>
            </div>
        </div>

        <h3 style="font-size: 1rem; color: var(--text-main); margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Filiação</h3>
        <div class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Nome do Pai</label>
                <input type="text" class="form-control" name="nome_pai" value="{{ cliente.nome_pai if cliente else '' }}" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Nome da Mãe</label>
                <input type="text" class="form-control" name="nome_mae" value="{{ cliente.nome_mae if cliente else '' }}" required>
            </div>
        </div>

        <h3 style="font-size: 1rem; color: var(--text-main); margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Endereço</h3>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">CEP</label>
                <input type="text" class="form-control" name="cep" value="{{ cliente.endereco.cep if cliente and cliente.endereco else '' }}" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Logradouro (Rua, Av, Praça)</label>
                <input type="text" class="form-control" name="logradouro" value="{{ cliente.endereco.logradouro if cliente and cliente.endereco else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Número</label>
                <input type="text" class="form-control" name="numero" value="{{ cliente.endereco.numero if cliente and cliente.endereco else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Bairro</label>
                <input type="text" class="form-control" name="bairro" value="{{ cliente.endereco.bairro if cliente and cliente.endereco else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Município</label>
                <input type="text" class="form-control" name="municipio" value="{{ cliente.endereco.municipio if cliente and cliente.endereco else '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">UF</label>
                <input type="text" class="form-control" name="unidade_federacao" value="{{ cliente.endereco.unidade_federacao if cliente and cliente.endereco else '' }}" required>
            </div>
            <div class="form-group" style="display: none;">
                <label class="form-label">País</label>
                <input type="text" class="form-control" name="pais" value="{{ cliente.endereco.pais if cliente and cliente.endereco else 'Brasil' }}" required>
            </div>
        </div>
    </form>
</div>
{% endblock %}
