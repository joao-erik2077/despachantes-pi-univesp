{% extends 'base.html' %}

{% block breadcrumb %}Processos / Cadastro{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header" style="background-color: #f8fafc; margin: -1.5rem -1.5rem 1.5rem -1.5rem; padding: 1rem 1.5rem; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; border-bottom: 2px solid var(--primary-color);">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <i class="ph ph-folder-open" style="font-size: 2rem; color: var(--primary-color);"></i>
            <div>
                <h2 class="card-title" style="margin-bottom: 0; color: #1e293b;">{{ 'Editar Processo' if processo else 'Novo Processo' }}</h2>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Abertura de serviço para um cliente/veículo</span>
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button type="submit" form="processoForm" class="btn btn-secondary"><i class="ph ph-floppy-disk" style="margin-right: 0.5rem;"></i>Salvar</button>
            <a href="{{ url_for('home.processos') }}" class="btn btn-danger"><i class="ph ph-x" style="margin-right: 0.5rem;"></i>Cancelar</a>
        </div>
    </div>

    <form id="processoForm" action="{{ url_for('home.processo_editar', id=processo.id) if processo else url_for('home.processo_novo') }}" method="POST">
        <h3 style="font-size: 1rem; color: var(--text-main); margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Vínculos do Processo</h3>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Cliente</label>
                <select class="form-control" name="cliente_id">
                    <option value="">-- Selecione o Cliente --</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}" {% if processo and processo.cliente_id == cliente.id %}selected{% endif %}>{{ cliente.nome }} - {{ cliente.cpf__cnpj }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Veículo</label>
                <select class="form-control" name="veiculo_id">
                    <option value="">-- Selecione o Veículo --</option>
                    {% for veiculo in veiculos %}
                    <option value="{{ veiculo.id }}" {% if processo and processo.veiculo_id == veiculo.id %}selected{% endif %}>{{ veiculo.placa }} - {{ veiculo.marca__modelo }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

    </form>
</div>
{% endblock %}
